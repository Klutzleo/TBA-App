<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBA — Player Profile</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <script src="/js/auth-helper.js"></script>
  <script src="/js/lucide.min.js"></script>
  <script src="/js/notification-drawer.js"></script>
  <link rel="stylesheet" href="/css/notification-drawer.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #1a1d29; min-height: 100vh; color: #e4e6eb; padding: 20px;
    }

    /* ── Nav ── */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 900px; margin: 0 auto 28px; padding: 0 4px;
    }
    .nav-back {
      color: #d4af37; text-decoration: none; font-size: 0.9rem;
      display: flex; align-items: center; gap: 6px;
    }
    .nav-back:hover { text-decoration: underline; }

    /* ── Profile header ── */
    .profile-header {
      max-width: 900px; margin: 0 auto 28px;
      background: #252937; border: 1px solid #3a3f54; border-radius: 14px;
      padding: 28px; display: flex; gap: 24px; align-items: flex-start;
    }
    .profile-avatar {
      width: 96px; height: 96px; border-radius: 50%;
      object-fit: cover; border: 3px solid #d4af37;
      background: #1e2130; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: #d4af37;
      position: relative;
    }
    .profile-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .avatar-edit-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.15s; cursor: pointer;
      font-size: 0.7rem; color: #fff; gap: 2px;
    }
    .profile-avatar:hover .avatar-edit-overlay { opacity: 1; }
    .avatar-edit-overlay span { font-size: 1.3rem; line-height: 1; }
    .profile-info { flex: 1; }
    .profile-username { font-size: 1.6rem; font-weight: 700; color: #d4af37; margin-bottom: 4px; }
    .profile-bio { color: #9ca3af; font-size: 0.9rem; margin-bottom: 12px; line-height: 1.5; }
    .profile-bio-empty { color: #4b5563; font-style: italic; font-size: 0.85rem; margin-bottom: 12px; }
    .profile-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 0.8rem; color: #6b7280; }
    .profile-meta span { display: flex; align-items: center; gap: 4px; }
    .profile-edit-btn {
      padding: 7px 16px; background: transparent; border: 1px solid #3a3f54;
      border-radius: 8px; color: #9ca3af; font-size: 0.85rem; cursor: pointer;
      transition: all 0.15s; margin-top: 10px;
    }
    .profile-edit-btn:hover { border-color: #d4af37; color: #d4af37; }
    .private-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(107,114,128,0.2); border: 1px solid rgba(107,114,128,0.3);
      border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; color: #9ca3af;
    }

    /* ── Tabs ── */
    .tab-bar {
      max-width: 900px; margin: 0 auto 20px;
      display: flex; gap: 8px; border-bottom: 1px solid #3a3f54; padding-bottom: 0;
    }
    .tab-btn {
      padding: 9px 18px; background: transparent; border: none;
      border-bottom: 2px solid transparent; color: #6b7280;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .tab-btn:hover { color: #e4e6eb; }
    .tab-btn.active { color: #d4af37; border-bottom-color: #d4af37; }
    .tab-pane { display: none; max-width: 900px; margin: 0 auto; }
    .tab-pane.active { display: block; }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .stat-card {
      background: #252937; border: 1px solid #3a3f54; border-radius: 10px;
      padding: 16px 14px; text-align: center;
    }
    .stat-card .stat-icon { font-size: 1.5rem; margin-bottom: 6px; }
    .stat-card .stat-value { font-size: 1.5rem; font-weight: 700; color: #d4af37; }
    .stat-card .stat-label { font-size: 0.72rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .stat-card.shame .stat-value { color: #f87171; }
    .stat-card.glory .stat-value { color: #a78bfa; }
    .stat-card.boost .stat-value { color: #f59e0b; }

    /* ── Character cards ── */
    .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .char-card {
      background: #252937; border: 1px solid #3a3f54; border-radius: 12px;
      padding: 16px; cursor: pointer; transition: all 0.15s;
    }
    .char-card:hover { border-color: #d4af37; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(212,175,55,0.1); }
    .char-card-header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .char-portrait {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      background: #1e2130; border: 2px solid #3a3f54;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0; overflow: hidden;
    }
    .char-portrait img { width: 100%; height: 100%; object-fit: cover; }
    .char-name { font-weight: 700; color: #e4e6eb; margin-bottom: 2px; }
    .char-level { font-size: 0.78rem; color: #6b7280; }
    .char-stats-mini {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; font-size: 0.78rem;
    }
    .char-stat-pill {
      background: #1e2130; border-radius: 6px; padding: 5px 6px; text-align: center;
    }
    .char-stat-pill .val { font-weight: 700; color: #e4e6eb; }
    .char-stat-pill .lbl { color: #6b7280; font-size: 0.68rem; }

    /* ── Character drill-down panel ── */
    .char-detail {
      display: none; background: #252937; border: 1px solid #3a3f54;
      border-radius: 14px; padding: 24px; margin-top: 14px;
    }
    .char-detail.open { display: block; }
    .char-detail-header {
      display: flex; gap: 16px; align-items: center; margin-bottom: 20px;
    }
    .char-detail-portrait {
      width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
      background: #1e2130; border: 2px solid #d4af37; flex-shrink: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
    }
    .char-detail-portrait img { width: 100%; height: 100%; object-fit: cover; }
    .char-detail-name { font-size: 1.2rem; font-weight: 700; color: #d4af37; }
    .char-detail-close {
      margin-left: auto; background: transparent; border: none;
      color: #6b7280; font-size: 1.2rem; cursor: pointer;
    }
    .char-detail-close:hover { color: #e4e6eb; }

    /* ── Edit modal ── */
    #editModal {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
    }
    #editModal.open { display: flex; }
    .edit-modal-box {
      background: #252937; border: 1px solid #3a3f54; border-radius: 14px;
      padding: 28px; max-width: 420px; width: 90%;
    }
    .edit-modal-box h3 { color: #d4af37; margin-bottom: 16px; }
    .edit-modal-box label { font-size: 0.82rem; color: #9ca3af; display: block; margin-bottom: 4px; }
    .edit-modal-box textarea, .edit-modal-box input[type=checkbox] { width: 100%; }
    .edit-modal-box textarea {
      background: #1e2130; border: 1px solid #3a3f54; border-radius: 8px;
      color: #e4e6eb; padding: 10px; font-size: 0.9rem; resize: vertical;
      font-family: inherit; margin-bottom: 14px;
    }
    .edit-modal-box .toggle-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
      font-size: 0.9rem; color: #e4e6eb;
    }
    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-save {
      padding: 9px 20px; background: #d4af37; border: none; border-radius: 8px;
      color: #13151f; font-weight: 700; cursor: pointer;
    }
    .btn-cancel {
      padding: 9px 20px; background: transparent; border: 1px solid #3a3f54;
      border-radius: 8px; color: #9ca3af; cursor: pointer;
    }

    /* ── Loading / empty ── */
    .loading { text-align: center; padding: 60px; color: #6b7280; font-size: 1rem; }
    .empty-state { text-align: center; padding: 40px; color: #6b7280; }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── SW Section ── */
    .sw-section {
      margin-bottom: 28px;
    }
    .sw-section-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #6b7280; font-weight: 600; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .sw-section-title::after {
      content: ''; flex: 1; height: 1px; background: #3a3f54;
    }
    .sw-camp-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;
    }
    .sw-camp-card {
      background: #252937; border: 1px solid #3a3f54; border-radius: 10px; padding: 14px 16px;
    }
    .sw-camp-name {
      font-weight: 700; color: #d4af37; font-size: 0.95rem; margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sw-camp-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .sw-pill {
      background: #1e2130; border-radius: 6px; padding: 4px 10px;
      font-size: 0.75rem; color: #9ca3af; display: flex; align-items: center; gap: 4px;
    }
    .sw-pill strong { color: #e4e6eb; }
    .sw-status-badge {
      font-size: 0.62rem; font-weight: 700; border-radius: 4px; padding: 1px 7px;
      text-transform: uppercase; letter-spacing: 0.05em; margin-left: auto;
    }
    .sw-status-badge.active   { background: rgba(52,211,153,0.15); color: #34d399; }
    .sw-status-badge.on_break { background: rgba(251,191,36,0.15);  color: #fbbf24; }
    .sw-status-badge.archived { background: rgba(107,114,128,0.15); color: #6b7280; }

    @media (max-width: 600px) {
      .profile-header { flex-direction: column; align-items: center; text-align: center; }
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
      .char-grid { grid-template-columns: 1fr; }
    }

    /* ── Achievements ───────────────────────────────────── */
    .achv-summary {
      display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
      padding: 16px 0 20px;
      border-bottom: 1px solid #2a2d3e;
      margin-bottom: 24px;
    }
    .achv-summary-stat { display: flex; flex-direction: column; align-items: center; }
    .achv-summary-stat .val { font-size: 1.4rem; font-weight: 700; color: #e4e6eb; }
    .achv-summary-stat .lbl { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; }
    .achv-progress-wrap { flex: 1; min-width: 180px; }
    .achv-progress-label { font-size: 0.75rem; color: #9ca3af; margin-bottom: 6px; }
    .achv-progress-bar { height: 5px; background: #2a2d3e; border-radius: 3px; overflow: hidden; }
    .achv-progress-fill { height: 100%; background: linear-gradient(90deg, #d4af37, #f0cc5a); border-radius: 3px; transition: width 0.8s ease; }
    .achv-showcase-unlocked {
      display: flex; align-items: center; gap: 8px;
      color: #d4af37; font-size: 0.82rem; font-weight: 600;
      padding: 7px 14px; background: rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.3); border-radius: 8px;
    }

    .achv-section { margin-bottom: 28px; }
    .achv-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .achv-section-name {
      font-size: 0.75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em; color: #6b7280;
    }
    .achv-section-count { font-size: 0.72rem; color: #374151; }

    .achv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 8px;
    }

    .achv-card {
      display: flex; flex-direction: column; align-items: center;
      background: #1e2130; border: 1px solid #2a2d3e;
      border-radius: 10px; padding: 12px 6px 10px;
      position: relative; text-align: center;
      transition: border-color 0.15s, transform 0.15s;
    }
    .achv-card:hover { border-color: #3a3d4e; transform: translateY(-1px); }
    .achv-card.earned { border-color: rgba(212,175,55,0.18); }
    .achv-card.locked { opacity: 0.38; filter: grayscale(0.7); }

    .achv-badge { width: 48px; height: 48px; margin-bottom: 8px; flex-shrink: 0; }
    .achv-badge-shape {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .achv-badge-shape svg { width: 20px; height: 20px; color: rgba(255,255,255,0.92); stroke: rgba(255,255,255,0.92); }

    /* Section badge shapes + colors */
    .achv-badge-shape.founding {
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      background: linear-gradient(135deg,#d4af37,#b8941f);
    }
    .achv-badge-shape.platform { border-radius: 50%; background: #1d4ed8; }
    .achv-badge-shape.time {
      clip-path: polygon(20% 0%,80% 0%,100% 20%,100% 80%,80% 100%,20% 100%,0% 80%,0% 20%);
      background: #6d28d9;
    }
    .achv-badge-shape.character {
      clip-path: polygon(50% 0%,93% 100%,7% 100%);
      background: #065f46;
    }
    .achv-badge-shape.character svg { margin-top: 10px; }
    .achv-badge-shape.combat {
      clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
      background: #b91c1c;
    }
    .achv-badge-shape.calling {
      clip-path: polygon(0% 0%,100% 0%,72% 48%,100% 100%,0% 100%,28% 48%);
      background: #4c1d95;
    }
    .achv-badge-shape.dice { border-radius: 22%; background: #0e7490; }
    .achv-badge-shape.shame {
      clip-path: polygon(0% 0%,75% 0%,100% 25%,100% 100%,25% 100%,0% 75%);
      background: #991b1b;
    }
    .achv-badge-shape.story { border-radius: 50% 50% 50% 0; background: #1e40af; }
    .achv-badge-shape.companions {
      clip-path: polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);
      background: #166534;
    }
    .achv-badge-shape.sw { border-radius: 8px 8px 0 0; background: #0f766e; }

    /* Narrative category gets a teal tint */
    .achv-badge-shape.cat-narrative { filter: hue-rotate(30deg) brightness(0.9); }

    .achv-name {
      font-size: 0.7rem; font-weight: 600; color: #e4e6eb;
      line-height: 1.3; margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; width: 100%;
    }
    .achv-diff-pill {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 1px 6px; border-radius: 10px; margin-bottom: 4px;
    }
    .achv-diff-pill.easy     { background: #14532d; color: #4ade80; }
    .achv-diff-pill.medium   { background: #1e3a5f; color: #60a5fa; }
    .achv-diff-pill.hard     { background: #431407; color: #f97316; }
    .achv-diff-pill.prestige { background: #3b1663; color: #a855f7; }
    .achv-diff-pill.founding { background: #2a2410; color: #d4af37; }
    .achv-diff-pill.narrative{ background: #0c2a2a; color: #22d3ee; }
    .achv-diff-pill.sw       { background: #0a2a28; color: #2dd4bf; }
    .achv-diff-pill.shame    { background: #2a0a0a; color: #f87171; }

    .achv-rarity { font-size: 0.62rem; margin-bottom: 3px; }
    .achv-rarity.common    { color: #4b5563; }
    .achv-rarity.uncommon  { color: #d4af37; }
    .achv-rarity.rare      { color: #60a5fa; text-shadow: 0 0 6px rgba(96,165,250,0.5); }
    .achv-rarity.ultra_rare { color: #14b8a6; font-weight: 700; }
    .achv-rarity.legendary {
      color: #a855f7; font-weight: 700;
      animation: legendPulse 2s infinite;
    }
    @keyframes legendPulse {
      0%,100% { text-shadow: 0 0 4px rgba(168,85,247,0.5); }
      50%      { text-shadow: 0 0 14px rgba(168,85,247,1); }
    }

    .achv-pts { font-size: 0.6rem; color: #4b5563; }
    .achv-earned-date { font-size: 0.58rem; color: #4ade80; margin-top: 3px; }
    .achv-checkmark {
      position: absolute; top: 5px; right: 5px;
      width: 14px; height: 14px; background: #14532d;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: #4ade80; font-weight: 700;
    }
    .achv-feature-btn {
      margin-top: 5px; font-size: 0.58rem; font-weight: 600;
      background: none; border: 1px solid #2a2d3e; border-radius: 6px;
      color: #6b7280; padding: 2px 8px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      width: 100%;
    }
    .achv-feature-btn:hover { border-color: #d4af37; color: #d4af37; }
    .achv-feature-btn.featured { border-color: #d4af37; color: #d4af37; background: rgba(212,175,55,0.08); }

    /* Badge showcase */
    .achv-showcase {
      margin-bottom: 28px;
      padding: 16px;
      background: #1e2130; border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
    }
    .achv-showcase-title {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: #d4af37; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .achv-showcase-slots {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .achv-showcase-slot {
      display: flex; flex-direction: column; align-items: center;
      width: 80px; text-align: center;
    }
    .achv-showcase-slot .achv-badge { width: 56px; height: 56px; margin-bottom: 6px; }
    .achv-showcase-slot .achv-badge-shape svg { width: 24px; height: 24px; }
    .achv-showcase-slot-name { font-size: 0.65rem; color: #9ca3af; line-height: 1.3; }
    .achv-showcase-slot.empty .achv-badge-shape {
      background: #252937; border: 2px dashed #3a3d4e; border-radius: 12px;
    }
    .achv-showcase-slot.locked .achv-badge-shape {
      background: #161820; border: 2px dashed #374151;
      border-radius: 12px; color: #374151;
    }
    .achv-showcase-slot.locked .achv-badge-shape svg {
      width: 18px; height: 18px; color: #374151; stroke: #374151;
    }
    .achv-showcase-slot-locked-label {
      font-size: 0.62rem; color: #4b5563; margin-top: 4px; font-weight: 600;
    }
    .achv-showcase-hint {
      font-size: 0.7rem; color: #4b5563; margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="top-nav">
  <a href="/campaigns.html" class="nav-back">← Back to Campaigns</a>
  <div style="display:flex;align-items:center;gap:10px;">
    <span id="viewingLabel" style="font-size:0.8rem;color:#6b7280;"></span>
    <div class="notif-bell-target"></div>
  </div>
</div>

<!-- Profile Header -->
<div class="profile-header" id="profileHeader">
  <div class="loading" style="width:100%">Loading profile…</div>
</div>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('stats')">📊 Stats</button>
  <button class="tab-btn" onclick="switchTab('characters')">⚔️ Characters</button>
  <button class="tab-btn" onclick="switchTab('achievements')" id="achievementsTabBtn">🏆 Achievements</button>
</div>

<!-- Stats Tab -->
<div id="tab-stats" class="tab-pane active">
  <div class="loading" id="statsLoading">Loading stats…</div>
  <div id="swContent" style="display:none;"></div>
  <div id="statsContent" style="display:none;"></div>
</div>

<!-- Characters Tab -->
<div id="tab-characters" class="tab-pane">
  <div id="charsContent"><div class="loading">Loading characters…</div></div>
</div>

<!-- Achievements Tab -->
<div id="tab-achievements" class="tab-pane">
  <div class="loading" id="achvLoading">Loading achievements…</div>
  <div id="achvContent" style="display:none;"></div>
</div>

<!-- Edit Profile Modal -->
<input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;" onchange="uploadAvatar(this)">

<div id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="edit-modal-box">
    <h3>✏️ Edit Profile</h3>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
      <div id="editAvatarPreview" style="width:56px;height:56px;border-radius:50%;border:2px solid #d4af37;background:#1e2130;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#d4af37;overflow:hidden;flex-shrink:0;"></div>
      <div>
        <div style="font-size:0.82rem;color:#9ca3af;margin-bottom:4px;">Profile Photo</div>
        <button class="btn-cancel" style="font-size:0.78rem;padding:4px 10px;" onclick="document.getElementById('avatarFileInput').click()">📷 Change Photo</button>
        <div id="avatarUploadStatus" style="font-size:0.75rem;color:#6b7280;margin-top:4px;"></div>
      </div>
    </div>
    <label>Bio (max 300 chars)</label>
    <textarea id="editBio" rows="4" maxlength="300" placeholder="Tell your story…"></textarea>
    <div class="toggle-row">
      <input type="checkbox" id="editPublic" style="width:auto;accent-color:#d4af37;">
      <label for="editPublic" style="margin:0;">Public profile (others can view your stats)</label>
    </div>
    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveProfile()">Save</button>
    </div>
  </div>
</div>

<script>
  const authToken = getAuthToken();
  const params = new URLSearchParams(location.search);
  const targetUsername = params.get('u');  // null = own profile

  let profileData = null;

  // ── Tab switching ──
  let achievementsLoaded = false;
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    event.target.closest('.tab-btn').classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'achievements' && !achievementsLoaded) {
      achievementsLoaded = true;
      loadAchievements();
    }
  }

  // ── Load profile ──
  async function loadProfile() {
    if (!authToken) { location.href = '/auth.html'; return; }
    try {
      const url = targetUsername
        ? `/api/profile/${encodeURIComponent(targetUsername)}`
        : '/api/profile/me';
      const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${authToken}` } });
      if (!resp.ok) throw new Error('Not found');
      profileData = await resp.json();
      renderHeader();
      renderSWSection();
      renderStats();
      renderCharacters();
      if (targetUsername) {
        document.getElementById('viewingLabel').textContent = `Viewing ${profileData.username}'s profile`;
        document.title = `${profileData.username} — TBA Profile`;
      } else {
        document.title = 'My Profile — TBA';
      }
    } catch (e) {
      document.getElementById('profileHeader').innerHTML = `<div class="loading">Profile not found.</div>`;
    }
  }

  // ── Render header ──
  function renderHeader() {
    const d = profileData;
    const isOwn = !targetUsername || d.is_own;
    const profile = d.profile || {};
    const avatarHtml = profile.avatar_url
      ? `<img src="${profile.avatar_url}" alt="avatar">`
      : (d.username ? d.username[0].toUpperCase() : '?');
    const joinDate = d.created_at ? new Date(d.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short' }) : '';
    const lastSeen = d.last_played_at ? `Last played ${new Date(d.last_played_at).toLocaleDateString()}` : '';
    const bio = profile.bio
      ? `<div class="profile-bio">${escHtml(profile.bio)}</div>`
      : (isOwn ? `<div class="profile-bio-empty">No bio yet — click Edit to add one.</div>` : '');
    const privacyBadge = !profile.is_public ? `<span class="private-badge">🔒 Private</span>` : '';
    const editBtn = isOwn
      ? `<button class="profile-edit-btn" onclick="openEdit()">✏️ Edit Profile</button>`
      : '';

    const avatarOverlay = isOwn
      ? `<div class="avatar-edit-overlay" onclick="document.getElementById('avatarFileInput').click()"><span>📷</span>Change</div>`
      : '';
    document.getElementById('profileHeader').innerHTML = `
      <div class="profile-avatar">${avatarHtml}${avatarOverlay}</div>
      <div class="profile-info">
        <div class="profile-username">${escHtml(d.username)} ${privacyBadge}</div>
        ${bio}
        <div class="profile-meta">
          ${joinDate ? `<span>📅 Joined ${joinDate}</span>` : ''}
          ${lastSeen ? `<span>🎲 ${lastSeen}</span>` : ''}
        </div>
        ${editBtn}
      </div>`;
  }

  // ── Render SW section ──
  function renderSWSection() {
    const camps = profileData.sw_campaigns || [];
    const container = document.getElementById('swContent');
    if (!camps.length) return;

    const statusLabel = s => s === 'on_break' ? 'On Break' : s.charAt(0).toUpperCase() + s.slice(1);

    const cards = camps.map(c => `
      <div class="sw-camp-card">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;">
          <div class="sw-camp-name" style="flex:1">${escHtml(c.name)}</div>
          <span class="sw-status-badge ${c.status}">${statusLabel(c.status)}</span>
        </div>
        <div class="sw-camp-pills">
          <div class="sw-pill">🧙 <strong>${c.player_count}</strong> Players</div>
          <div class="sw-pill">🐉 <strong>${c.npc_count}</strong> NPCs</div>
          ${c.created_at ? `<div class="sw-pill">📅 <strong>${Math.floor((Date.now() - new Date(c.created_at)) / 86400000)}d</strong> old</div>` : ''}
        </div>
      </div>`).join('');

    container.innerHTML = `
      <div class="sw-section">
        <div class="sw-section-title">🎭 Story Weaver</div>
        <div class="sw-camp-grid">${cards}</div>
      </div>`;
    container.style.display = 'block';
    document.getElementById('statsLoading').style.display = 'none';
  }

  // ── Render stats ──
  function renderStats() {
    const s = profileData.stats || {};
    document.getElementById('statsLoading').style.display = 'none';
    document.getElementById('statsContent').style.display = 'block';

    const fmt = n => (n || 0).toLocaleString();
    const totalActivity = (s.total_rolls || 0) + (s.total_messages_sent || 0) + (s.total_attacks || 0);

    if (totalActivity === 0) {
      const isOwn = !targetUsername || profileData.is_own;
      document.getElementById('statsContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">🎲</div>
          <div style="font-size:1rem;color:#e4e6eb;margin-bottom:8px;">No stats yet</div>
          <div style="font-size:0.85rem;color:#6b7280;max-width:340px;margin:0 auto;">
            ${isOwn
              ? 'Stats start tracking as soon as you play. Jump into a campaign and start rolling!'
              : 'This player hasn\'t logged any activity yet.'}
          </div>
        </div>`;
      return;
    }

    const cards = [
      { icon: '🎲', val: fmt(s.total_rolls), label: 'Total Dice Rolled', cls: '' },
      { icon: '💀', val: fmt(s.total_ones), label: '1s Rolled (Hall of Shame)', cls: 'shame' },
      { icon: '✨', val: fmt(s.total_max_rolls), label: 'Max Rolls (Natural Max)', cls: 'glory' },
      { icon: '⚔️', val: fmt(s.total_attacks), label: 'Attacks Made', cls: '' },
      { icon: '💥', val: fmt(s.total_damage_dealt), label: 'Total Damage Dealt', cls: '' },
      { icon: '🛡️', val: fmt(s.total_damage_taken), label: 'Total Damage Taken', cls: '' },
      { icon: '🔥', val: fmt(s.biggest_hit_dealt), label: 'Biggest Hit Dealt', cls: 'glory' },
      { icon: '😬', val: fmt(s.biggest_hit_taken), label: 'Biggest Hit Taken', cls: 'shame' },
      { icon: '📊', val: fmt(s.total_stat_checks), label: 'Stat Checks', cls: '' },
      { icon: '💪', val: fmt(s.total_pp_checks), label: 'PP Checks', cls: '' },
      { icon: '🧠', val: fmt(s.total_ip_checks), label: 'IP Checks', cls: '' },
      { icon: '🗣️', val: fmt(s.total_sp_checks), label: 'SP Checks', cls: '' },
      { icon: '⚡', val: fmt(s.total_initiatives), label: 'Initiatives Rolled', cls: '' },
      { icon: '✦', val: fmt(s.total_bap_used), label: 'BAP Used', cls: 'boost' },
      { icon: '🔗', val: fmt(s.total_tethers_invoked), label: 'Tethers Invoked', cls: 'boost' },
      { icon: '✨', val: fmt(s.total_abilities_cast), label: 'Abilities Cast', cls: '' },
      { icon: '💬', val: fmt(s.total_messages_sent), label: 'Messages Sent', cls: '' },
      { icon: '⚔️', val: fmt(s.battles_survived), label: 'Battles Survived', cls: '' },
      { icon: '💀', val: fmt(s.total_callings), label: 'Times Called', cls: 'shame' },
      { icon: '🩹', val: fmt(s.total_battle_scars), label: 'Battle Scars', cls: '' },
    ];

    document.getElementById('statsContent').innerHTML = `
      <div class="stat-grid">
        ${cards.map(c => `
          <div class="stat-card ${c.cls}">
            <div class="stat-icon">${c.icon}</div>
            <div class="stat-value">${c.val}</div>
            <div class="stat-label">${c.label}</div>
          </div>`).join('')}
      </div>`;
  }

  // ── Render characters ──
  function renderCharacters() {
    const chars = profileData.characters || [];
    const el = document.getElementById('charsContent');
    if (!chars.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">⚔️</div><div>No characters yet.</div></div>`;
      return;
    }
    el.innerHTML = `
      <div class="char-grid">
        ${chars.map((c, i) => `
          <div class="char-card" onclick="toggleCharDetail(${i})">
            <div class="char-card-header">
              <div class="char-portrait">
                ${c.portrait_url ? `<img src="${c.portrait_url}" alt="${escHtml(c.name)}">` : '⚔️'}
              </div>
              <div>
                <div class="char-name">${escHtml(c.name)}</div>
                <div class="char-level">Level ${c.level || 1}</div>
              </div>
            </div>
            <div class="char-stats-mini">
              <div class="char-stat-pill"><div class="val">${c.pp || 0}</div><div class="lbl">PP</div></div>
              <div class="char-stat-pill"><div class="val">${c.ip || 0}</div><div class="lbl">IP</div></div>
              <div class="char-stat-pill"><div class="val">${c.sp || 0}</div><div class="lbl">SP</div></div>
              <div class="char-stat-pill"><div class="val">${c.dp || 0}</div><div class="lbl">DP</div></div>
              <div class="char-stat-pill"><div class="val">${c.edge || 0}</div><div class="lbl">Edge</div></div>
              <div class="char-stat-pill"><div class="val">${c.bap || 0}</div><div class="lbl">BAP</div></div>
            </div>
          </div>
          <div class="char-detail" id="charDetail_${i}">
            ${renderCharDetail(c)}
          </div>`).join('')}
      </div>`;
  }

  function renderCharDetail(c) {
    const s = c.stats || {};
    const fmt = n => (n || 0).toLocaleString();
    return `
      <div class="char-detail-header">
        <div class="char-detail-portrait">
          ${c.portrait_url ? `<img src="${c.portrait_url}" alt="${escHtml(c.name)}">` : '⚔️'}
        </div>
        <div>
          <div class="char-detail-name">${escHtml(c.name)}</div>
          <div style="color:#6b7280;font-size:0.82rem;">Level ${c.level || 1}${c.last_played_at ? ' · Last played ' + new Date(c.last_played_at).toLocaleDateString() : ''}</div>
        </div>
        <button class="char-detail-close" onclick="event.stopPropagation();toggleCharDetail(null)">&times;</button>
      </div>
      <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));">
        <div class="stat-card"><div class="stat-icon">🎲</div><div class="stat-value">${fmt(s.total_rolls)}</div><div class="stat-label">Rolls</div></div>
        <div class="stat-card shame"><div class="stat-icon">💀</div><div class="stat-value">${fmt(s.total_ones)}</div><div class="stat-label">1s Rolled</div></div>
        <div class="stat-card glory"><div class="stat-icon">✨</div><div class="stat-value">${fmt(s.total_max_rolls)}</div><div class="stat-label">Max Rolls</div></div>
        <div class="stat-card"><div class="stat-icon">⚔️</div><div class="stat-value">${fmt(s.total_attacks)}</div><div class="stat-label">Attacks</div></div>
        <div class="stat-card"><div class="stat-icon">💥</div><div class="stat-value">${fmt(s.total_damage_dealt)}</div><div class="stat-label">Dmg Dealt</div></div>
        <div class="stat-card glory"><div class="stat-icon">🔥</div><div class="stat-value">${fmt(s.biggest_hit_dealt)}</div><div class="stat-label">Biggest Hit</div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value">${fmt(s.total_stat_checks)}</div><div class="stat-label">Stat Checks</div></div>
        <div class="stat-card"><div class="stat-icon">✨</div><div class="stat-value">${fmt(s.total_abilities_cast)}</div><div class="stat-label">Abilities</div></div>
        <div class="stat-card shame"><div class="stat-icon">💀</div><div class="stat-value">${fmt(s.total_callings)}</div><div class="stat-label">Times Called</div></div>
        <div class="stat-card boost"><div class="stat-icon">✦</div><div class="stat-value">${fmt(s.total_bap_used)}</div><div class="stat-label">BAP Used</div></div>
        <div class="stat-card boost"><div class="stat-icon">🔗</div><div class="stat-value">${fmt(s.total_tethers_invoked)}</div><div class="stat-label">Tethers</div></div>
        <div class="stat-card"><div class="stat-icon">💬</div><div class="stat-value">${fmt(s.total_messages_sent)}</div><div class="stat-label">Messages</div></div>
      </div>`;
  }

  let openDetailIdx = null;
  function toggleCharDetail(i) {
    if (openDetailIdx !== null) {
      document.getElementById(`charDetail_${openDetailIdx}`).classList.remove('open');
    }
    if (i !== null && i !== openDetailIdx) {
      document.getElementById(`charDetail_${i}`).classList.add('open');
      openDetailIdx = i;
    } else {
      openDetailIdx = null;
    }
  }

  // ── Edit profile modal ──
  function openEdit() {
    const p = profileData.profile || {};
    document.getElementById('editBio').value = p.bio || '';
    document.getElementById('editPublic').checked = p.is_public !== false;
    const preview = document.getElementById('editAvatarPreview');
    preview.innerHTML = p.avatar_url
      ? `<img src="${p.avatar_url}" style="width:100%;height:100%;object-fit:cover;">`
      : (profileData.username ? profileData.username[0].toUpperCase() : '?');
    document.getElementById('avatarUploadStatus').textContent = '';
    document.getElementById('editModal').classList.add('open');
  }
  function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

  async function uploadAvatar(input) {
    const file = input.files[0];
    if (!file) return;
    const statusEl = document.getElementById('avatarUploadStatus');
    statusEl.textContent = 'Uploading…';
    try {
      const form = new FormData();
      form.append('file', file);
      const uploadResp = await fetch('/api/upload/portrait', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${authToken}` },
        body: form,
      });
      if (!uploadResp.ok) throw new Error('Upload failed');
      const { url } = await uploadResp.json();

      const patchResp = await fetch('/api/profile/me', {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ avatar_url: url }),
      });
      if (!patchResp.ok) throw new Error('Save failed');
      const data = await patchResp.json();
      profileData.profile = data.profile;

      const preview = document.getElementById('editAvatarPreview');
      if (preview) preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
      statusEl.textContent = '✓ Saved';
      renderHeader();
    } catch (e) {
      statusEl.textContent = '✗ ' + e.message;
    }
    input.value = '';
  }

  async function saveProfile() {
    const bio = document.getElementById('editBio').value.trim();
    const is_public = document.getElementById('editPublic').checked;
    try {
      const resp = await fetch('/api/profile/me', {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ bio, is_public }),
      });
      if (!resp.ok) throw new Error('Save failed');
      const data = await resp.json();
      profileData.profile = data.profile;
      renderHeader();
      closeEdit();
    } catch (e) {
      alert('Could not save profile: ' + e.message);
    }
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Achievements ──────────────────────────────────────────────────────────
  const SECTION_ORDER = ['founding','platform','time','character','combat','calling','dice','shame','story','companions','sw'];
  const SECTION_NAMES = {
    founding:   'Founding',
    platform:   'Profile & Platform',
    time:       'Time & Consistency',
    character:  'Character & Leveling',
    combat:     'Combat & Survival',
    calling:    'The Calling',
    dice:       'Dice & Rolls',
    shame:      'Hall of Shame',
    story:      'Story & Narrative',
    companions: 'Companions',
    sw:         'Story Weaver',
  };

  async function loadAchievements() {
    if (!authToken) return;
    try {
      const resp = await fetch('/api/achievements/me', {
        headers: { 'Authorization': `Bearer ${authToken}` },
      });
      if (!resp.ok) throw new Error();
      renderAchievements(await resp.json());
    } catch(e) {
      document.getElementById('achvLoading').style.display = 'none';
      document.getElementById('achvContent').innerHTML =
        '<div class="empty-state"><div class="icon">🏆</div><div>Could not load achievements.</div></div>';
      document.getElementById('achvContent').style.display = 'block';
    }
  }

  let _achvData = null;
  const isOwnProfile = !targetUsername || (profileData && profileData.is_own);

  function renderAchievements(d) {
    _achvData = d;
    const loading = document.getElementById('achvLoading');
    const el = document.getElementById('achvContent');
    loading.style.display = 'none';

    const pct = Math.min((d.total_points / d.badge_showcase_threshold) * 100, 100);
    const progressHtml = d.badge_showcase_unlocked
      ? ''
      : `<div class="achv-progress-wrap">
           <div class="achv-progress-label">Badge Showcase: ${d.total_points.toLocaleString()} / ${d.badge_showcase_threshold} pts</div>
           <div class="achv-progress-bar"><div class="achv-progress-fill" style="width:${pct}%"></div></div>
         </div>`;

    const summaryHtml = `
      <div class="achv-summary">
        <div class="achv-summary-stat"><div class="val">${d.total_earned}</div><div class="lbl">Earned</div></div>
        <div class="achv-summary-stat"><div class="val">${d.total_possible}</div><div class="lbl">Total</div></div>
        <div class="achv-summary-stat"><div class="val">${d.total_points.toLocaleString()}</div><div class="lbl">Points</div></div>
        ${progressHtml}
      </div>`;

    const showcaseHtml = _renderShowcase(d);

    // Group by section
    const bySection = {};
    for (const a of d.achievements) {
      if (!bySection[a.section]) bySection[a.section] = [];
      bySection[a.section].push(a);
    }

    const sectionsHtml = SECTION_ORDER
      .filter(s => bySection[s] && bySection[s].length)
      .map(s => {
        const list = bySection[s];
        const earnedCount = list.filter(a => a.earned).length;
        const swNote = s === 'sw'
          ? `<span style="font-size:0.65rem;color:#0d9488;margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0;">Visible to all players</span>`
          : '';
        return `
          <div class="achv-section">
            <div class="achv-section-header">
              <span class="achv-section-name">${SECTION_NAMES[s]}${swNote}</span>
              <span class="achv-section-count">${earnedCount} / ${list.length}</span>
            </div>
            <div class="achv-grid">${list.map(renderAchvCard).join('')}</div>
          </div>`;
      }).join('');

    el.innerHTML = summaryHtml + showcaseHtml + sectionsHtml;
    el.style.display = 'block';
    if (window.lucide) lucide.createIcons();
  }

  function _renderShowcase(d) {
    if (!d.badge_showcase_unlocked) return '';
    const maxSlots = d.max_featured_slots || 3;
    const featured = d.featured_badges || [];
    const byId = {};
    for (const a of d.achievements) byId[a.id] = a;
    const thresholds = d.slot_thresholds || [150, 300, 500];
    const nextThreshold = thresholds.find(t => t > d.total_points);

    // Build slots: filled, empty, locked
    let slotsHtml = '';
    for (let i = 0; i < 5; i++) {
      const isUnlocked = i < maxSlots;
      const aid = featured[i];
      const a = aid ? byId[aid] : null;
      const unlockPts = thresholds[i] || null;

      if (!isUnlocked) {
        slotsHtml += `
          <div class="achv-showcase-slot locked" title="${unlockPts ? 'Unlocks at ' + unlockPts + ' pts' : ''}">
            <div class="achv-badge">
              <div class="achv-badge-shape dice">
                <i data-lucide="lock"></i>
              </div>
            </div>
            <div class="achv-showcase-slot-locked-label">${unlockPts ? unlockPts + ' pts' : ''}</div>
          </div>`;
      } else if (a) {
        const catClass = a.category !== 'standard' ? ` cat-${a.category}` : '';
        slotsHtml += `
          <div class="achv-showcase-slot" title="${escHtml(a.description)}">
            <div class="achv-badge">
              <div class="achv-badge-shape ${a.section}${catClass}">
                <i data-lucide="${a.icon}"></i>
              </div>
            </div>
            <div class="achv-showcase-slot-name">${escHtml(a.name)}</div>
          </div>`;
      } else {
        slotsHtml += `
          <div class="achv-showcase-slot empty">
            <div class="achv-badge"><div class="achv-badge-shape dice" style="opacity:0.2;"></div></div>
            <div class="achv-showcase-slot-name" style="color:#374151;">Empty</div>
          </div>`;
      }
    }

    const hintText = isOwnProfile
      ? (nextThreshold
          ? `<div class="achv-showcase-hint">Earn ${nextThreshold - d.total_points} more pts to unlock another slot</div>`
          : `<div class="achv-showcase-hint">All slots unlocked</div>`)
      : '';

    const editHint = isOwnProfile && featured.length === 0
      ? `<div class="achv-showcase-hint">Click "Feature" on any earned badge below to add it here</div>`
      : '';

    return `
      <div class="achv-showcase">
        <div class="achv-showcase-title">
          <span>✦ Badge Showcase</span>
          <span style="font-size:0.65rem;color:#6b7280;font-weight:400;text-transform:none;letter-spacing:0;">${maxSlots} / 5 slots unlocked</span>
        </div>
        <div class="achv-showcase-slots">${slotsHtml}</div>
        ${hintText}${editHint}
      </div>`;
  }

  function renderAchvCard(a) {
    const diffLabel = a.difficulty
      ? a.difficulty.charAt(0).toUpperCase() + a.difficulty.slice(1)
      : ({ founding:'Founding', narrative:'Narrative', sw:'SW', shame:'Shame' }[a.category] || '');
    const diffClass = a.difficulty || ({ founding:'founding', narrative:'narrative', sw:'sw', shame:'shame' }[a.category] || '');
    const diffPill = diffLabel ? `<div class="achv-diff-pill ${diffClass}">${diffLabel}</div>` : '';
    const catClass = a.category !== 'standard' ? ` cat-${a.category}` : '';
    const earnedDate = a.earned && a.earned_at
      ? new Date(a.earned_at).toLocaleDateString('en-US', { month:'short', year:'numeric' })
      : '';
    const featured = _achvData && (_achvData.featured_badges || []).includes(a.id);
    const showFeatureBtn = a.earned && isOwnProfile && _achvData && _achvData.badge_showcase_unlocked;
    const featureBtn = showFeatureBtn
      ? `<button class="achv-feature-btn ${featured ? 'featured' : ''}"
           onclick="toggleFeatured('${a.id}')">${featured ? '★ Featured' : '☆ Feature'}</button>`
      : '';
    return `
      <div class="achv-card ${a.earned ? 'earned' : 'locked'}" title="${escHtml(a.description)}">
        ${a.earned ? '<div class="achv-checkmark">✓</div>' : ''}
        <div class="achv-badge">
          <div class="achv-badge-shape ${a.section}${catClass}">
            <i data-lucide="${a.icon}"></i>
          </div>
        </div>
        <div class="achv-name">${escHtml(a.name)}</div>
        ${diffPill}
        <div class="achv-rarity ${a.rarity_label}">${a.rarity_display}</div>
        <div class="achv-pts">${a.points} pts</div>
        ${earnedDate ? `<div class="achv-earned-date">✓ ${earnedDate}</div>` : ''}
        ${featureBtn}
      </div>`;
  }

  async function toggleFeatured(achievementId) {
    if (!_achvData) return;
    const maxSlots = _achvData.max_featured_slots || 3;
    let featured = [...(_achvData.featured_badges || [])];
    if (featured.includes(achievementId)) {
      featured = featured.filter(id => id !== achievementId);
    } else {
      if (featured.length >= maxSlots) {
        // Remove the oldest to make room
        featured.shift();
      }
      featured.push(achievementId);
    }
    try {
      const resp = await fetch('/api/profile/me/featured-badges', {
        method: 'PATCH',
        headers: { 'Authorization': `Bearer ${authToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ featured_badges: featured }),
      });
      if (!resp.ok) throw new Error();
      const data = await resp.json();
      _achvData.featured_badges = data.featured_badges;
      renderAchievements(_achvData);
    } catch(e) {
      alert('Could not save — try again');
    }
  }

  initNotificationCenter();
  loadProfile();
</script>
</body>
</html>
